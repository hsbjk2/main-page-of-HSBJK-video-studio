
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HSBJK Video Studio</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#f4f6f8;
  color:#222;
}

/* ---------- COMMON ---------- */
button{
  padding:12px 18px;
  border:none;
  background:#1e293b;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
  transition:all .25s ease;
  font-size:15px;
}

button:hover{
  box-shadow:0 0 12px rgba(30,41,59,.6);
  transform:translateY(-2px);
}

/* ---------- HOME ---------- */
.home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
  text-align:center;
}

/* BIGGER LOGO */
.logo{
  width:220px;
  transition:.3s ease;
}

.logo:hover{
  transform:scale(1.05);
  filter:drop-shadow(0 0 14px rgba(0,0,0,0.35));
}

/* FONT COLOR CHANGED */
.home h1{
  font-size:40px;
  margin:10px 0;
  letter-spacing:1px;
  color:#0f172a;
}

/* SUMMARY (ONLY ADDITION) */
.summary{
  font-size:15px;
  color:#334155;
  max-width:520px;
  line-height:1.5;
}

/* Optional subtitle color */
.subtitle{
  color:#475569;
  font-size:16px;
}

.mode-buttons{
  display:flex;
  gap:30px;
  margin-top:12px;
}

@media(max-width:600px){
  .logo{
    width:180px;
  }
  .mode-buttons{
    flex-direction:column;
    gap:15px;
  }
}
</style>
</head>

<body>

<!-- HOME / LANDING PAGE -->
<div class="home">

  <!-- LOGO -->
  <img src="logo.png" alt="HSBJK Logo" class="logo">

  <!-- TITLE -->
  <h1>HSBJK Video Studio</h1>

  <!-- SHORT SUMMARY (ONLY ADDITION) -->
  <div class="summary">
    A simple and user-friendly platform to watch videos and edit them easily in one place.
  </div>

  <!-- OPTIONAL SUBTITLE -->
  <div class="subtitle">Watch • Edit • Create</div>

  <!-- BUTTONS -->
  <div class="mode-buttons">
    <button onclick="goToWatch()">▶ Watch Video</button>
    <button onclick="goToEdit()">✂ Edit Video</button>
  </div>

</div>

<script>
/* 🔗 PUT YOUR WEBSITE LINKS HERE */
function goToWatch(){
  window.location.href = "https://hsbjk2.github.io/Video-watching-Page/";
}

function goToEdit(){
  window.location.href = "https://hsbjk2.github.io/Edit-video-/";
}
</script>

</body>
</html>
